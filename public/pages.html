<!DOCTYPE html>
<html>
<head>
    <title>GitHub Pages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Add CSS styles for responsiveness */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #fileList {
            padding: 0;
            border: 1px solid #ccc; /* Add border to the list */
            border-radius: 5px; /* Optional: Add rounded corners to the list */
        }

        #fileList li {
            margin-bottom: 10px;
            list-style-type: none;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Align items horizontally with space in between */
            padding: 10px; /* Add padding to the list items */
            border-bottom: 1px solid #ccc; /* Add border between list items */
        }

        #fileList li:last-child {
            border-bottom: none; /* Remove border from the last list item */
        }

        #fileList li button {
            margin-left: 10px; /* Adjust margin to move the buttons to the right */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        const username = "mrinalcs",
            repository = "mrinalcs",
            folder = "public",
            apiEndpoint = `https://api.github.com/repos/${username}/${repository}/contents/${folder}`;

        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }

        function openModal(url, pageTitle) {
            const modalTitle = document.getElementById("modalTitle");
            modalTitle.textContent = pageTitle; // Set modal title to the iframe page title

            const modalBody = document.getElementById("modalBody");
            modalBody.innerHTML = `<iframe src="${url}" frameborder="0" width="100%" height="400"></iframe>`;
            $("#myModal").modal("show"); // Show the Bootstrap modal
        }

        function getHTMLFiles() {
            fetch(apiEndpoint)
                .then((response) => response.json())
                .then((data) => {
                    const htmlFiles = data.filter((file) => file.name.endsWith(".html") && file.name !== "pages.html");
                    const fileList = document.getElementById("fileList");
                    fileList.innerHTML = "";
                    htmlFiles.forEach((file) => {
                        const listItem = document.createElement("li");
                        const link = document.createElement("a");
                        const fileName = file.name.replace(".html", "");
                        link.textContent = capitalizeFirstLetter(fileName);

                        const newTabButton = document.createElement("button");
                        newTabButton.className = "btn btn-primary";
                        newTabButton.innerHTML = '<i class="fas fa-external-link-alt"></i>'; // Add icon using Font Awesome

                        const modalButton = document.createElement("button");
                        modalButton.className = "btn btn-primary";
                        modalButton.innerHTML = '<i class="fas fa-external-link-square-alt"></i>'; // Add icon using Font Awesome

                        link.addEventListener("click", () => window.open(`https://mrinal.ga/${file.path.replace(`${folder}/`, "").replace(".html", "")}`, "_blank"));
                        newTabButton.addEventListener("click", () => window.open(`https://mrinal.ga/${file.path.replace(`${folder}/`, "").replace(".html", "")}`, "_blank"));
                        modalButton.addEventListener("click", () => openModal(`https://mrinal.ga/${file.path.replace(`${folder}/`, "").replace(".html", "")}`, capitalizeFirstLetter(fileName)));

                        listItem.appendChild(link);
                        listItem.appendChild(modalButton);
                        listItem.appendChild(newTabButton); // Move the newTabButton after the modalButton
                        fileList.appendChild(listItem);
                    });
                })
                .catch((error) => {
                    console.error("Error:", error);
                });
        }
    </script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> <!-- Add Font Awesome library -->
</head>
<body onload="getHTMLFiles()">
    <h1>GitHub Pages</h1>
    <ul id="fileList"></ul>
    <hr>

    <!-- Bootstrap Modal -->
    <div class="modal fade" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <a href="https://app.netlify.com/sites/mrinalcs/deploys">
        <img src="https://api.netlify.com/api/v1/badges/7ae2c0a3-b8fe-4dd4-9b18-8d65e5c8213e/deploy-status" alt="Netlify Status" />
    </a>
</body>
</html>
