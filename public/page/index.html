<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Items with Bootstrap Styles</title>
    <style>
        /* Custom CSS styles for Bootstrap-styled list */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }

        li a {
            color: #007bff;
            text-decoration: none;
            flex-grow: 1;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        li a:hover {
            text-decoration: underline;
        }

        /* Custom CSS styles for iframe modal */
        #iframeModal .modal-dialog {
            max-width: 800px;
        }

        #iframeModal .modal-content {
            border: none;
            border-radius: 0;
        }

        #iframeModal .modal-body {
            padding: 0;
            position: relative;
        }

        #iframeModal .modal-iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <h1>List of Items</h1>

    <ul id="item-list">
        <!-- This empty list will be populated dynamically using JavaScript -->
    </ul>

    <!-- Modal for iframe URL -->
    <div class="modal fade" id="iframeModal" tabindex="-1" role="dialog" aria-labelledby="iframeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <iframe class="modal-iframe" src="" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Function to fetch the list of items from GitHub using the GitHub API
        async function fetchItemList() {
            const repoOwner = "mrinalcs";
            const repoName = "mrinalcs";
            const folderPath = "public/page";
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (Array.isArray(data)) {
                    data.forEach(item => {
                        if (item.type === "file" && item.name !== "index.html") {
                            const itemName = item.name;
                            const itemUrl = `/page/${itemName}`;

                            const listItem = document.createElement("li");
                            const link = document.createElement("a");
                            link.href = "#";
                            link.textContent = itemName;
                            link.addEventListener("click", () => openModal(itemUrl));
                            listItem.appendChild(link);
                            document.getElementById("item-list").appendChild(listItem);
                        }
                    });
                } else {
                    console.error("Error: Invalid response from the GitHub API.");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // Function to open iframe URL in modal
        function openModal(url) {
            const iframeModal = document.getElementById("iframeModal");
            const modalIframe = iframeModal.querySelector(".modal-iframe");
            modalIframe.src = url;
            iframeModal.style.display = "block";
        }

        // Call the function to fetch and populate the item list
        fetchItemList();
    </script>
</body>
</html>
