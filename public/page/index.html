<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Items with Bootstrap Styles</title>
    <style>
        /* Custom CSS styles for Bootstrap-styled list */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 5px;
            margin-bottom: 5px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        li a {
            color: #007bff;
            text-decoration: none;
        }

        li a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>List of Items</h1>

    <ul id="item-list">
        <!-- This empty list will be populated dynamically using JavaScript -->
    </ul>

    <script>
        // Function to fetch the list of items from GitHub using the GitHub API
        async function fetchItemList() {
            const repoOwner = "mrinalcs";
            const repoName = "mrinalcs";
            const folderPath = "public/page";
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (Array.isArray(data)) {
                    data.forEach(item => {
                        if (item.type === "file") {
                            const itemName = item.name;
                            const itemUrl = `/page/${itemName}`;

                            const listItem = document.createElement("li");
                            const link = document.createElement("a");
                            link.href = itemUrl;
                            link.textContent = itemName;
                            listItem.appendChild(link);
                            document.getElementById("item-list").appendChild(listItem);
                        }
                    });
                } else {
                    console.error("Error: Invalid response from the GitHub API.");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // Call the function to fetch and populate the item list
        fetchItemList();
    </script>
</body>
</html>
