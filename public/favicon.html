<!DOCTYPE html>
<html>
<head>
  <link id="favicon" rel="icon" type="image/png" href="default-favicon.png">
  <script>
    function fetchFavicon() {
      // Replace 'mrinalcs' with the GitHub username and 'mrinalcs' with the repository name
      var username = 'mrinalcs';
      var repo = 'mrinalcs';
      var path = 'public/icon';

      var url = 'https://api.github.com/repos/' + username + '/' + repo + '/contents/' + path;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          // Get the first file in the 'public/icon' folder
          var file = data[0];

          // Update the favicon href with the image URL
          var favicon = document.getElementById('favicon');
          favicon.href = file.download_url;
        })
        .catch(error => {
          console.error('Error fetching favicon:', error);
        });
    }

    // Fetch the favicon initially
    fetchFavicon();

    // Fetch the favicon every second
    setInterval(fetchFavicon, 1000);
  </script>
</head>
<body>
  <!-- Rest of your HTML content -->
</body>
</html>
