<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="/public/hero-bg-1.jpg" as="image">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <title>Mrinal</title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('public/fonts/BorunaDemoVersionRegular-vmDA7.otf') format('opentype');
    }

    body {
      font-family: 'CustomFont', sans-serif;
    }

    /* CSS for the navigation bar */
    .navbar {
      background-color: #333;
      overflow: hidden;
    }

    .navbar a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    /* CSS for the hamburger menu */
    .navbar .icon {
      display: none;
    }

    .navbar .icon.closed::after {
      content: "\2630"; /* Hamburger icon */
    }

    .navbar .icon.opened::after {
      content: "\2715"; /* Close icon */
    }

    @media screen and (max-width: 600px) {
      .navbar a:not(:first-child) {
        display: none;
      }

      .navbar a.icon {
        float: right;
        display: block;
      }
    }

    @media screen and (max-width: 600px) {
      .navbar.responsive {
        position: relative;
      }

      .navbar.responsive .icon {
        position: absolute;
        right: 0;
        top: 0;
      }

      .navbar.responsive a {
        float: none;
        display: block;
        text-align: left;
      }
    }
  </style>

  <script>
    function toggleNavbar() {
      var navbar = document.getElementById("myNavbar");
      var icon = navbar.getElementsByClassName("icon")[0];

      if (navbar.classList.contains("responsive")) {
        navbar.classList.remove("responsive");
        icon.classList.remove("opened");
        icon.classList.add("closed");
      } else {
        navbar.classList.add("responsive");
        icon.classList.remove("closed");
        icon.classList.add("opened");
      }

      // Clear the "Page Not Found" message if it's displayed
      var contentDiv = document.getElementById("content");
      if (contentDiv.innerHTML.includes("Page Not Found")) {
        contentDiv.innerHTML = "";
      }
    }

    function loadContent(page) {
      var contentDiv = document.getElementById("content");
      var pageTitle = "Mrinal"; // Default page title
      var jsonFile = "";
      switch (page) {
        case "":
        case "/":
          jsonFile = "home.json";
          pageTitle = "Mrinal";
          break;
        case "/about":
          jsonFile = "about.json";
          pageTitle = "About";
          break;
        case "/insta":
          fetch("https://api.github.com/repos/mrinalcs/mrinalcs/contents/public/instagram")
            .then(function(response) {
              if (!response.ok) {
                throw new Error("Failed to load the content.");
              }
              return response.json();
            })
            .then(function(data) {
              var imageHTML = data.map(function(image) {
                return "<img src='" + image.download_url + "' class='photo' loading='lazy'>";
              });

              contentDiv.innerHTML = "<div class='photo-container'>" + imageHTML.join("") + "</div>";
              document.title = "Insta"; // Update the document title

              var styleElement = document.createElement("style");
              styleElement.textContent = ".photo-container { display: flex; flex-wrap: wrap; justify-content: center; } .photo { display: block; margin: 10px; width: 100%; height: auto; }";
              document.head.appendChild(styleElement);
            })
            .catch(function(error) {
              contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
              document.title = "Error";
            });
          break;
        case "/contact":
          jsonFile = "contact.json";
          pageTitle = "Contact";
          break;
        default:
          contentDiv.innerHTML = "<h1>Page Not Found</h1><p>The requested page was not found.</p>";
          document.title = "Page Not Found";
          return; // Exit the function
      }

      document.title = pageTitle; // Set the page title

      contentDiv.innerHTML = "<div class='loading'>Loading...</div>"; // Display the loading state

      if (jsonFile) {
        fetch(jsonFile)
          .then(function(response) {
            if (!response.ok) {
              throw new Error("Failed to load the content.");
            }
            return response.json();
          })
          .then(function(data) {
            contentDiv.innerHTML = data.content;
            document.title = pageTitle; // Update the document title

            if (data.css) {
              var styleElement = document.createElement("style");
              styleElement.textContent = data.css; // Apply CSS code
              document.head.appendChild(styleElement);
            }

            // Add event listeners to links in the loaded content
            var links = contentDiv.querySelectorAll("a");
            links.forEach(function(link) {
              link.addEventListener("click", handleLinkClick);
            });
          })
          .catch(function(error) {
            contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
            document.title = "Error";
          });
      }
    }

    function handleLinkClick(event) {
      event.preventDefault();
      var page = event.target.getAttribute("href");

      var navbar = document.getElementById("myNavbar");
      if (navbar.classList.contains("responsive")) {
        toggleNavbar(); // Close the navigation menu if it's responsive
      }

      loadContent(page);
      history.pushState(null, null, page); // Update the browser URL
    }

    window.addEventListener("popstate", function(event) {
      var page = location.pathname;
      loadContent(page);
    });

    window.addEventListener("DOMContentLoaded", function(event) {
      var links = document.querySelectorAll(".navbar a");
      links.forEach(function(link) {
        link.addEventListener("click", handleLinkClick);
      });

      var menuIcon = document.querySelector(".navbar .icon");
      menuIcon.addEventListener("click", toggleNavbar);

      var initialPage = location.pathname;
      loadContent(initialPage);
    });
  </script>
</head>
<body>
  <div class="navbar" id="myNavbar">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/insta">Instagram</a>
    <a href="/contact">Contact</a>
    <a class="icon closed" onclick="toggleNavbar()"></a>
  </div>
  
  <div id="content">
    <!-- Content will be loaded dynamically -->
  </div>
</body>
</html>
