<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" href="/public/hero-bg-1.jpg" as="image">
    <link rel="preload" href="loading.gif" as="image">

  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <title>Mrinal</title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('public/fonts/BorunaDemoVersionRegular-vmDA7.otf') format('opentype');
    }

    body {
      font-family: 'CustomFont', sans-serif;
    }

    /* CSS for the navigation bar */
    .navbar {
      background-color: #333;
      overflow: hidden;
    }

    .navbar a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    /* CSS for the hamburger menu */
    .navbar .icon {
      display: none;
    }

    .navbar .icon.closed::after {
      content: "\2630"; /* Hamburger icon */
    }

    .navbar .icon.opened::after {
      content: "\2715"; /* Close icon */
    }

    @media screen and (max-width: 600px) {
      .navbar a:not(:first-child) {
        display: none;
      }

      .navbar a.icon {
        float: right;
        display: block;
      }
    }

    @media screen and (max-width: 600px) {
      .navbar.responsive {
        position: relative;
      }

      .navbar.responsive .icon {
        position: absolute;
        right: 0;
        top: 0;
      }

      .navbar.responsive a {
        float: none;
        display: block;
        text-align: left;
      }
    }


  /* CSS for the insta */
    .grid-container {
  columns: 5 200px;
  column-gap: 1.5rem; 
  margin: 0 auto;
}
 
 
 
.grid-container div img {
  width: 100%;  
  transition: all 0.25s ease-in-out;
}
  </style>

  <script>
    function toggleNavbar() {
      var navbar = document.getElementById("myNavbar");
      var icon = navbar.getElementsByClassName("icon")[0];

      if (navbar.classList.contains("responsive")) {
        navbar.classList.remove("responsive");
        icon.classList.remove("opened");
        icon.classList.add("closed");
      } else {
        navbar.classList.add("responsive");
        icon.classList.remove("closed");
        icon.classList.add("opened");
      }

      // Clear the "Page Not Found" message if it's displayed
      var contentDiv = document.getElementById("content");
      if (contentDiv.innerHTML.includes("Page Not Found")) {
        contentDiv.innerHTML = "";
      }
    }

    function loadContent(page) {
      var contentDiv = document.getElementById("content");
      var pageTitle = "Mrinal"; // Default page title
      var jsonFile = "";
      switch (page) {
        case "":
        case "/":
          jsonFile = "home.json";
          pageTitle = "Mrinal";
          break;
        case "/about":
          jsonFile = "about.json";
          pageTitle = "About";
          break;
       
        case "/instagram":
                    pageTitle = "Instagram";

  fetch("https://api.github.com/repos/mrinalcs/mrinalcs/contents/public/instagram")
    .then(function(response) {
      if (!response.ok) {
        throw new Error("Failed to load the content.");
      }
      return response.json();
    })
    .then(function(data) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var image = entry.target;
            image.src = image.dataset.src;
            observer.unobserve(image);
          }
        });
      });

      var imageHTML = data.map(function(image) {
        return "<div><img src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAHElEQVQI12P4//8/w38GIAXDIBKE0DHxgljNBAAO9TXL0Y4OHwAAAABJRU5ErkJggg==' data-src='" + image.download_url + "' class='photo' loading='lazy'></div>";
      });

      contentDiv.innerHTML = "<div  class='grid-container'>" + imageHTML.join("") + "</div>";
     

      var images = contentDiv.querySelectorAll(".photo");
      images.forEach(function(image) {
        observer.observe(image);
      });
    })
    .catch(function(error) {
      contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
      document.title = "Error";
    });
  break;






          case "/ringtone":
          pageTitle = "Ringtone";
  fetch("https://api.github.com/repos/mrinalcs/mrinalcs/contents/public/audio")
    .then(function(response) {
      if (!response.ok) {
        throw new Error("Failed to load the content.");
      }
      return response.json();
    })
    .then(function(data) {
      var audioList = data.map(function(audio, index) {
        return {
          title: audio.name,
          source: audio.download_url,
          index: index
        };
      });

      var currentSongIndex = 0;
      var audioElement = new Audio(audioList[currentSongIndex].source);
      var isPlaying = false;

      function playSong(index) {
        audioElement.pause();
        audioElement.src = audioList[index].source;
        audioElement.load();
        audioElement.play();
        currentSongIndex = index;
        highlightCurrentSong();
        isPlaying = true;
        playButton.textContent = "Pause";
      }

      function pauseSong() {
        audioElement.pause();
        isPlaying = false;
        playButton.textContent = "Play";
      }

      function togglePlayPause() {
        if (isPlaying) {
          pauseSong();
        } else {
          playSong(currentSongIndex);
        }
      }

      function playNextSong() {
        var nextSongIndex = (currentSongIndex + 1) % audioList.length;
        playSong(nextSongIndex);
      }

      function playPreviousSong() {
        var previousSongIndex = (currentSongIndex - 1 + audioList.length) % audioList.length;
        playSong(previousSongIndex);
      }

      function createMusicList() {
        var listHTML = audioList
          .map(function(audio, index) {
            return "<li data-index='" + index + "'>" + audio.title + "</li>";
          })
          .join("");

        return "<ul class='music-list'>" + listHTML + "</ul>";
      }

      function highlightCurrentSong() {
        var musicListItems = player.querySelectorAll(".music-list li");
        musicListItems.forEach(function(item) {
          item.classList.remove("current-song");
        });
        musicListItems[currentSongIndex].classList.add("current-song");
      }

      contentDiv.innerHTML = "<div class='music-player'>" +
        "<h1>Ringtone Player</h1>" +
        "<div class='controls'>" +
        "<button class='previous-btn'>Previous</button>" +
        "<button class='play-pause-btn'>Play</button>" +
        "<button class='next-btn'>Next</button>" +
        "</div>" +
        createMusicList() +
        "</div>";
     

      var player = contentDiv.querySelector(".music-player");
      var playButton = player.querySelector(".play-pause-btn");
      var previousButton = player.querySelector(".previous-btn");
      var nextButton = player.querySelector(".next-btn");
      var musicListItems = player.querySelectorAll(".music-list li");

      playButton.addEventListener("click", function() {
        togglePlayPause();
      });

      previousButton.addEventListener("click", function() {
        playPreviousSong();
      });

      nextButton.addEventListener("click", function() {
        playNextSong();
      });

      musicListItems.forEach(function(item) {
        item.addEventListener("click", function() {
          var index = parseInt(item.getAttribute("data-index"));
          playSong(index);
        });
      });

      audioElement.addEventListener("ended", playNextSong);

      highlightCurrentSong();
    })
    .catch(function(error) {
      contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
      document.title = "Error";
    });
  break;






case "/photos":
          pageTitle = "Photos";
  fetch("https://api.github.com/repos/mrinalcs/mrinalcs/contents/public/images")
    .then(function(response) {
      if (!response.ok) {
        throw new Error("Failed to load the content.");
      }
      return response.json();
    })
    .then(function(data) {
      var imageList = data.map(function(image) {
        return {
          title: image.name,
          source: image.download_url,
          alt: image.name
        };
      });

      function createPhotoGallery() {
        var galleryHTML = imageList
          .map(function(image) {
            return "<div><img src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAHElEQVQI12P4//8/w38GIAXDIBKE0DHxgljNBAAO9TXL0Y4OHwAAAABJRU5ErkJggg==' data-src='" + image.source + "' alt='" + image.alt + "' class='lazy'></div>";
          })
          .join("");

        return "<div class='grid-container'>" + galleryHTML + "</div>";
      }

      contentDiv.innerHTML = createPhotoGallery();
    

      // Lazy load images when they come into the viewport
      var lazyImages = contentDiv.querySelectorAll(".lazy");
      var lazyImageObserver = new IntersectionObserver(function(entries, observer) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var lazyImage = entry.target;
            lazyImage.src = lazyImage.getAttribute("data-src");
            lazyImage.classList.remove("lazy");
            lazyImageObserver.unobserve(lazyImage);
          }
        });
      });

      lazyImages.forEach(function(lazyImage) {
        lazyImageObserver.observe(lazyImage);
      });
    })
    .catch(function(error) {
      contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
      document.title = "Error";
    });
  break;




          





          
          
        case "/contact":
          jsonFile = "contact.json";
          pageTitle = "Contact";
          break;
        default:
          contentDiv.innerHTML = "<h1>Page Not Found</h1><p>The requested page was not found.</p>";
          document.title = "Page Not Found";
          return; // Exit the function
      }

      document.title = pageTitle; // Set the page title

      contentDiv.innerHTML = "<div class='loading'>Loading...</div>"; // Display the loading state

      if (jsonFile) {
        fetch(jsonFile)
          .then(function(response) {
            if (!response.ok) {
              throw new Error("Failed to load the content.");
            }
            return response.json();
          })
          .then(function(data) {
            contentDiv.innerHTML = data.content;
            document.title = pageTitle; // Update the document title

            if (data.css) {
              var styleElement = document.createElement("style");
              styleElement.textContent = data.css; // Apply CSS code
              document.head.appendChild(styleElement);
            }

            // Add event listeners to links in the loaded content
            var links = contentDiv.querySelectorAll("a");
            links.forEach(function(link) {
              link.addEventListener("click", handleLinkClick);
            });
          })
          .catch(function(error) {
            contentDiv.innerHTML = "<h1>Error</h1><p>" + error.message + "</p>";
            document.title = "Error";
          });
      }
    }

    function handleLinkClick(event) {
      event.preventDefault();
      var page = event.target.getAttribute("href");

      var navbar = document.getElementById("myNavbar");
      if (navbar.classList.contains("responsive")) {
        toggleNavbar(); // Close the navigation menu if it's responsive
      }

      loadContent(page);
      history.pushState(null, null, page); // Update the browser URL
    }

    window.addEventListener("popstate", function(event) {
      var page = location.pathname;
      loadContent(page);
    });

    window.addEventListener("DOMContentLoaded", function(event) {
      var links = document.querySelectorAll(".navbar a");
      links.forEach(function(link) {
        link.addEventListener("click", handleLinkClick);
      });

      var menuIcon = document.querySelector(".navbar .icon");
      menuIcon.addEventListener("click", toggleNavbar);

      var initialPage = location.pathname;
      loadContent(initialPage);
    });
  </script>
</head>
<body>
  <div class="navbar" id="myNavbar">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a class="icon closed" onclick="toggleNavbar()"></a>
  </div>
  
  <div id="content">
    <!-- Content will be loaded dynamically -->
  </div>
</body>
</html>
